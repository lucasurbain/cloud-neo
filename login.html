<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>Cloud-Néo | Log In</title>
</head>
<body>
    <main>

        <section class="login">
            <div class="logo__container">
                <img src="icon/system/logo-cloud-néo-border.png" alt="" srcset="" class="logo">
            </div>
            <div class="contact__container">
                <div class="title__container">
                    <h3 class="contact__title">Cloud-Néo</h3>
                </div>
                <form class="contact__form" action="index.html" method="GET">
                    <div class="contact__form-div">
                        <label class="contact__form-tag">Nom d'utilisateur</label>
                        <input name="Nom: " type="text" placeholder="Insérez votre nom d'utilisateur" class="contact__form-input">
                    </div>

                    <div class="contact__form-div">
                        <label class="contact__form-tag">Mot de passe</label>
                        <input name="Password: " type="password" placeholder="Insérez votre mot de passe" class="contact__form-input">
                    </div>
                    <div class="contact__button">
                        <button class="button">Se connecter</button>
                    </div>
                </form>
            </div>
            <div class="add__subscription">
                <p>Vous n'avez pas encore de compte ? <a href="#">Inscrivez-vous</a></p>
            </div>
        </section>
    </main>
</body>
</html>
